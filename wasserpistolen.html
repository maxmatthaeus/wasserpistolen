<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Wasserpistolen Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

const G = 16;
let CW, CH, TS, OX, OY, HUD_H, JOY_R, JOY_MAX, JOY_LX, JOY_LY, JOY_RX, JOY_RY;

function resize() {
  CW = cv.width  = window.innerWidth;
  CH = cv.height = window.innerHeight;
  HUD_H = Math.round(CH * 0.085);
  JOY_R = Math.round(Math.min(CW, CH) * 0.08);
  JOY_MAX = JOY_R * 1.35;
  const joyAreaH = JOY_R * 2 + 28;
  const availW = CW * 0.92;
  const availH = CH - HUD_H - joyAreaH - 4;
  TS = Math.floor(Math.min(availW / G, availH / G));
  if (TS < 16) TS = 16;
  OX = (CW - TS * G) / 2;
  OY = HUD_H + (availH - TS * G) / 2 + 2;
  JOY_LX = CW * 0.17;
  JOY_RX = CW * 0.83;
  JOY_LY = JOY_RY = CH - JOY_R - 14;
}
resize();
window.addEventListener('resize', resize);

// ─── Map ─────────────────────────────────────────────────────
const FLOOR = 0, WALL = 1, WATER = 2, OUTLET = 3, UPGRADE = 4;
let map = [];

function buildMap() {
  map = [];
  for (let y = 0; y < G; y++) map[y] = new Array(G).fill(FLOOR);
  for (let i = 0; i < G; i++) map[0][i] = map[G-1][i] = map[i][0] = map[i][G-1] = WALL;
  [[4,3],[4,4],[5,3],[10,3],[11,3],[11,4],
   [4,11],[4,12],[5,12],[10,12],[11,11],[11,12],
   [7,7],[8,7],[7,8],
   [3,7],[3,8],[12,7],[12,8],
   [7,3],[7,4],[8,12],[8,11]
  ].forEach(([x,y]) => map[y][x] = WALL);
  [[2,2],[13,2],[2,13],[13,13]].forEach(([x,y]) => map[y][x] = WATER);
  map[6][4] = OUTLET;
  map[9][11] = OUTLET;
  map[8][8] = UPGRADE;
}

function toSc(wx, wy) {
  return { x: OX + wx * TS, y: OY + wy * TS };
}
function fromSc(sx, sy) {
  return { x: (sx - OX) / TS, y: (sy - OY) / TS };
}
function walkable(wx, wy) {
  const gx = Math.floor(wx), gy = Math.floor(wy);
  if (gx < 0 || gy < 0 || gx >= G || gy >= G) return false;
  return map[gy][gx] !== WALL;
}

// ─── Projectile ───────────────────────────────────────────────
class Proj {
  constructor(x, y, angle, owner, dmg=1) {
    this.x = x; this.y = y;
    this.angle = angle; this.owner = owner; this.dmg = dmg;
    this.speed = 9; this.alive = true; this.trail = [];
  }
  update(dt) {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 5) this.trail.shift();
    const nx = this.x + Math.cos(this.angle) * this.speed * dt;
    const ny = this.y + Math.sin(this.angle) * this.speed * dt;
    if (!walkable(nx, ny) || nx < 0 || nx >= G || ny < 0 || ny >= G) { this.alive = false; }
    else { this.x = nx; this.y = ny; }
  }
  draw() {
    for (let i = 0; i < this.trail.length; i++) {
      const ts = toSc(this.trail[i].x, this.trail[i].y);
      ctx.fillStyle = `rgba(0,200,255,${(i+1)/this.trail.length*0.55})`;
      ctx.beginPath(); ctx.arc(ts.x, ts.y, TS*0.04, 0, Math.PI*2); ctx.fill();
    }
    const s = toSc(this.x, this.y);
    const col = this.dmg > 1 ? '#e0e' : '#0ef';
    ctx.shadowColor = col; ctx.shadowBlur = 8;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(s.x, s.y, TS*(this.dmg>1?0.1:0.075), 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ─── Entity ───────────────────────────────────────────────────
class Entity {
  constructor(x, y, name, isAI, team) {
    this.x = x; this.y = y;
    this.name = name; this.isAI = isAI; this.team = team;
    this.lives = 10; this.water = 10; this.charge = 20;
    this.angle = 0; this.speed = isAI ? 2.8 : 3.8;
    this.state = 'normal'; this.chargeTimer = 0; this.invul = false;
    this.shootCd = 0; this.hitFlash = 0; this.walkCycle = 0;
    this.aiState = 'patrol'; this.aiTarget = null; this.aiTimer = 0;
    this.wanderPt = {x, y};
    this.doubleShot = false; this.upgradeTimer = 0;
    this.path = []; this.pathGoal = null; this.pathTimer = 0;
  }
  get alive() { return this.lives > 0; }
  bodyColor() {
    if (!this.alive) return '#444';
    const t = 1 - (this.lives - 1) / 9;
    return `rgb(${Math.round(220*(1-t))},15,${Math.round(220*t)})`;
  }
  tryMove(dx, dy, dt) {
    if (this.state !== 'normal') return;
    const r = 0.32;
    const nx = this.x + dx * this.speed * dt;
    const ny = this.y + dy * this.speed * dt;
    if (walkable(nx+r,this.y)&&walkable(nx-r,this.y)&&walkable(nx,this.y+r)&&walkable(nx,this.y-r))
      this.x = Math.max(0.5, Math.min(G-0.5, nx));
    if (walkable(this.x+r,ny)&&walkable(this.x-r,ny)&&walkable(this.x,ny+r)&&walkable(this.x,ny-r))
      this.y = Math.max(0.5, Math.min(G-0.5, ny));
    this.walkCycle += dt * 6;
  }
  shoot() {
    if (this.water<=0||this.charge<=0||this.state!=='normal'||this.shootCd>0) return null;
    this.water--; this.charge--; this.shootCd = 0.28;
    return new Proj(this.x, this.y, this.angle, this, this.doubleShot ? 2 : 1);
  }
  takeDmg(dmg=1) {
    if (this.invul || !this.alive) return false;
    this.lives = Math.max(0, this.lives - dmg);
    this.hitFlash = 0.22;
    if (this.lives === 0) this.state = 'dead';
    return true;
  }
  nearStation() {
    const gx = Math.floor(this.x), gy = Math.floor(this.y);
    for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
      const nx = gx+dx, ny = gy+dy;
      if (nx>=0&&ny>=0&&nx<G&&ny<G) {
        const t = map[ny][nx];
        if ((t===WATER||t===OUTLET)&&Math.hypot(this.x-(nx+0.5),this.y-(ny+0.5))<1.25) return t;
      }
    }
    return null;
  }
  onUpgradeTile() {
    const gx = Math.floor(this.x), gy = Math.floor(this.y);
    return gx>=0&&gy>=0&&gx<G&&gy<G&&map[gy][gx]===UPGRADE;
  }
  update(dt) {
    if (this.shootCd > 0) this.shootCd -= dt;
    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.state === 'charging') {
      this.chargeTimer -= dt;
      if (this.chargeTimer <= 0) { this.charge = 20; this.state = 'normal'; this.invul = false; }
    }
    if (this.state === 'normal') {
      const st = this.nearStation();
      if (this.water < 10 && st === WATER) this.water = 10;
      if (this.charge < 10 && st === OUTLET) { this.state='charging'; this.chargeTimer=3; this.invul=true; }
    }
    if (!this.doubleShot && this.alive) {
      if (this.state === 'normal' && this.onUpgradeTile()) {
        this.upgradeTimer += dt;
        if (this.upgradeTimer >= 2) this.doubleShot = true;
      } else {
        this.upgradeTimer = 0;
      }
    }
  }
  updateAI(dt, all) {
    if (!this.alive || !this.isAI) return null;
    this.aiTimer -= dt;
    if (this.state === 'charging') return null;
    if (this.charge <= 0) this.aiState = 'outlet';
    else if (this.water <= 0) this.aiState = 'waterpt';
    else {
      const foes = all.filter(e => e !== this && e.alive && e.team !== this.team);
      if (foes.length) {
        this.aiState = 'hunt';
        this.aiTarget = foes.reduce((a,b) =>
          Math.hypot(a.x-this.x,a.y-this.y)<Math.hypot(b.x-this.x,b.y-this.y)?a:b);
      } else this.aiState = 'patrol';
    }
    let newP = null;
    if (this.aiState === 'outlet') {
      const g = findTile(this, OUTLET); if (g) this.followPath(g.x, g.y, dt);
    } else if (this.aiState === 'waterpt') {
      const g = findTile(this, WATER); if (g) this.followPath(g.x, g.y, dt);
    } else if (this.aiState === 'hunt' && this.aiTarget && this.aiTarget.alive) {
      const t = this.aiTarget;
      const dist = Math.hypot(t.x-this.x, t.y-this.y);
      this.angle = Math.atan2(t.y-this.y, t.x-this.x);
      if (dist > 3.5) this.moveToward(t.x, t.y, dt);
      else if (dist < 1.8) {
        const len = Math.hypot(t.x-this.x,t.y-this.y)||1;
        this.tryMove((this.x-t.x)/len,(this.y-t.y)/len,dt);
      }
      if (dist < 7 && this.aiTimer <= 0) {
        this.angle += (Math.random()-0.5)*0.28; newP = this.shoot();
        this.aiTimer = 0.28 + Math.random()*0.45;
      }
    } else {
      if (this.aiTimer<=0||Math.hypot(this.x-this.wanderPt.x,this.y-this.wanderPt.y)<0.5) {
        let wx, wy, tries=0;
        do { wx=1+Math.random()*(G-2); wy=1+Math.random()*(G-2); } while (!walkable(wx,wy)&&++tries<20);
        this.wanderPt={x:wx,y:wy}; this.aiTimer=1.5+Math.random()*2;
      }
      this.moveToward(this.wanderPt.x, this.wanderPt.y, dt);
    }
    return newP;
  }
  moveToward(tx, ty, dt) {
    const dx=tx-this.x, dy=ty-this.y, len=Math.hypot(dx,dy);
    if (len>0.05) { this.angle=Math.atan2(dy,dx); this.tryMove(dx/len,dy/len,dt); }
  }
  followPath(gx, gy, dt) {
    if (!this.pathGoal || this.pathGoal.x!==gx || this.pathGoal.y!==gy || this.pathTimer<=0) {
      this.path = computePath(Math.floor(this.x), Math.floor(this.y), gx, gy) || [];
      this.pathGoal = {x:gx, y:gy};
      this.pathTimer = 1.2;
    }
    this.pathTimer -= dt;
    while (this.path.length && Math.hypot(this.path[0].x-this.x, this.path[0].y-this.y) < 0.3) this.path.shift();
    if (this.path.length) this.moveToward(this.path[0].x, this.path[0].y, dt);
    else this.moveToward(gx+0.5, gy+0.5, dt);
  }
  draw() {
    if (!this.alive) return;
    const s = toSc(this.x, this.y);
    const sc = TS / 40;
    ctx.save(); ctx.translate(s.x, s.y);
    const flash = this.hitFlash > 0;
    const col = flash ? '#fff' : this.bodyColor();
    const skin = flash ? '#fff' : '#f2c880';
    const ca = Math.cos(this.angle), sa = Math.sin(this.angle);
    const gdx = ca*TS*0.4, gdy = sa*TS*0.4;
    const pdx = -sa*TS*0.2, pdy = ca*TS*0.2;
    const wob = Math.sin(this.walkCycle)*1.5;
    const legSway = Math.sin(this.walkCycle)*2;
    const rw = TS*0.2, rh = TS*0.24;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(0,rh*2.2,rw*1.5,rh*0.45,0,0,Math.PI*2); ctx.fill();

    // Legs
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(pdx*0.6+legSway, rh*1.7+pdy*0.6, rw*0.75, rh*1.1, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-pdx*0.6-legSway, rh*1.7-pdy*0.6, rw*0.75, rh*1.1, 0, 0, Math.PI*2); ctx.fill();

    // Torso
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(0, -rh*0.1+wob*0.2, rw*1.8, rh*1.6, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1; ctx.stroke();

    // Left arm
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(-pdx*1.1-gdx*0.15,-pdy*1.1-gdy*0.15-rh*0.2, rw*0.75, rh*0.55, Math.atan2(pdy,pdx)+Math.PI/2, 0, Math.PI*2); ctx.fill();

    // Right arm (gun arm)
    const armTx=gdx*0.6+pdx*0.4, armTy=gdy*0.6+pdy*0.4;
    ctx.beginPath(); ctx.ellipse(armTx, armTy-rh*0.2, rw*0.75, rh*0.55, Math.atan2(gdy,gdx), 0, Math.PI*2); ctx.fill();

    // Invul shield
    if (this.invul) {
      const pulse=(Math.sin(Date.now()*0.01)+1)/2;
      ctx.strokeStyle=`rgba(255,255,0,${0.45+pulse*0.45})`; ctx.lineWidth=3*sc;
      ctx.beginPath(); ctx.ellipse(0,0,rw*3.8,rh*2.6,0,0,Math.PI*2); ctx.stroke();
    }

    // Upgrade charge-up ring
    if (this.upgradeTimer > 0 && !this.doubleShot) {
      const frac = Math.min(1, this.upgradeTimer/2);
      ctx.strokeStyle='#ffd200'; ctx.lineWidth=3*sc; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(0,0,rw*3.2,-Math.PI/2,-Math.PI/2+frac*Math.PI*2); ctx.stroke();
    }

    // Head
    ctx.fillStyle=skin;
    ctx.beginPath(); ctx.ellipse(0,-rh*2.1+wob*0.3,rw*1.4,rh,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=0.5; ctx.stroke();

    // Team-coloured hair/helmet
    const teamCol = flash?'#fff':(this.team===0?'#22cc44':'#ff6600');
    ctx.fillStyle=teamCol;
    ctx.beginPath(); ctx.ellipse(0,-rh*2.9,rw*1.3,rh*0.55,0,0,Math.PI*2); ctx.fill();

    // Team badge
    if (!flash) {
      ctx.fillStyle=teamCol;
      ctx.beginPath(); ctx.arc(0,-rh*4.0,rw*0.8,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=0.8; ctx.stroke();
    }

    // Eyes
    if (!flash) {
      ctx.fillStyle='#222';
      ctx.beginPath(); ctx.arc(gdx*0.2-rw*0.45,-rh*2.1+gdy*0.1,rw*0.22,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(gdx*0.2+rw*0.45,-rh*2.1+gdy*0.1,rw*0.22,0,Math.PI*2); ctx.fill();
    }

    // Gun
    drawGun(ctx, armTx+gdx*0.5, armTy+gdy*0.5-rh*0.2, Math.atan2(gdy,gdx), flash, sc);

    // Double-shot badge
    if (this.doubleShot && !flash) {
      ctx.fillStyle='#e0e'; ctx.font=`bold ${Math.max(8,9*sc)}px monospace`; ctx.textAlign='center';
      ctx.fillText('2×', rw*1.8, -rh*3.2);
    }

    // Name
    const teamCol2=this.team===0?'#22cc44':'#ff6600';
    ctx.fillStyle=flash?'rgba(255,255,255,0.8)':teamCol2;
    ctx.font=`bold ${Math.max(8,10*sc)}px monospace`; ctx.textAlign='center';
    ctx.fillText(this.name, 0, -rh*5.5);

    if (this.state==='charging') {
      ctx.fillStyle='#ff0'; ctx.font=`bold ${Math.max(7,9*sc)}px monospace`;
      ctx.fillText(`⚡ ${this.chargeTimer.toFixed(1)}s`, 0, rh*3.5);
    }
    ctx.restore();
  }
}

function drawGun(ctx, cx, cy, angle, flash, sc=1) {
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
  const s=sc;
  ctx.fillStyle=flash?'#fff':'#1a44cc';
  ctx.fillRect(-1*s,-3*s,15*s,5.5*s);
  ctx.strokeStyle=flash?'#ccc':'#0a2a88'; ctx.lineWidth=0.6; ctx.stroke();
  if (!flash) {
    ctx.fillStyle='#2255dd';
    for (let i=0;i<4;i++) { ctx.beginPath(); ctx.arc(1.5*s+i*3*s,-1*s,0.7*s,0,Math.PI*2); ctx.fill(); }
  }
  ctx.fillStyle=flash?'#fff':'#e8a000';
  ctx.fillRect(-1*s,-3*s,2.5*s,5.5*s);
  ctx.fillRect(11.5*s,-2*s,2.5*s,4*s);
  ctx.strokeStyle=flash?'#fff':'#e8a000'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(10*s,2.5*s,2*s,0,Math.PI); ctx.stroke();
  ctx.fillStyle=flash?'#fff':'#e8a000';
  ctx.beginPath(); ctx.ellipse(6*s,-3*s,3.5*s,2*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=flash?'rgba(255,255,255,0.7)':'rgba(200,235,255,0.72)';
  ctx.fillRect(2.8*s,-11*s,6.5*s,8.5*s);
  ctx.strokeStyle=flash?'#ddd':'rgba(150,210,245,0.85)'; ctx.lineWidth=0.5; ctx.stroke();
  if (!flash) { ctx.fillStyle='rgba(80,180,255,0.35)'; ctx.fillRect(3.2*s,-7*s,5.7*s,4*s); }
  ctx.fillStyle=flash?'#fff':'rgba(230,248,255,0.9)';
  ctx.beginPath(); ctx.ellipse(6*s,-11*s,3.3*s,1.8*s,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function computePath(sx, sy, gx, gy) {
  const key=(x,y)=>x+','+y;
  if (sx===gx && sy===gy) return [];
  const visited = new Set([key(sx,sy)]);
  const parent = {};
  const queue = [[sx,sy]];
  let qi = 0, found = false;
  while (qi < queue.length && !found) {
    const [cx,cy] = queue[qi++];
    for (const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx=cx+dx, ny=cy+dy;
      if (nx<0||ny<0||nx>=G||ny>=G) continue;
      if (map[ny][nx]===WALL) continue;
      const k=key(nx,ny);
      if (visited.has(k)) continue;
      visited.add(k); parent[k]=key(cx,cy); queue.push([nx,ny]);
      if (nx===gx && ny===gy) { found=true; break; }
    }
  }
  if (!visited.has(key(gx,gy))) return null;
  const path=[]; let cur=key(gx,gy);
  const startKey=key(sx,sy);
  while (cur !== startKey) {
    const [px,py]=cur.split(',').map(Number);
    path.push({x:px+0.5,y:py+0.5});
    cur=parent[cur];
    if (cur===undefined) break;
  }
  path.reverse();
  return path;
}

function findTile(ent, type) {
  let best=null, bd=Infinity;
  for (let y=0;y<G;y++) for (let x=0;x<G;x++)
    if (map[y][x]===type) { const d=Math.hypot(ent.x-(x+0.5),ent.y-(y+0.5)); if(d<bd){bd=d;best={x,y};} }
  return best;
}

// ─── Tile Drawing ─────────────────────────────────────────────
function drawTile(gx, gy) {
  const type=map[gy][gx];
  const s=toSc(gx,gy);
  const cx=s.x+TS/2, cy=s.y+TS/2;

  if (type===FLOOR) {
    ctx.fillStyle='#2a3a2a'; ctx.fillRect(s.x,s.y,TS,TS);
  } else if (type===WALL) {
    ctx.fillStyle='#585e5e'; ctx.fillRect(s.x,s.y,TS,TS);
    ctx.strokeStyle='#3a4040'; ctx.lineWidth=1; ctx.strokeRect(s.x+1,s.y+1,TS-2,TS-2);
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(s.x,s.y+TS*0.72,TS,TS*0.28);
  } else if (type===WATER) {
    ctx.fillStyle='#182840'; ctx.fillRect(s.x,s.y,TS,TS);
    ctx.fillStyle='#1a5a99';
    ctx.beginPath(); ctx.arc(cx,cy,TS*0.34,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3399cc';
    ctx.beginPath(); ctx.arc(cx,cy,TS*0.24,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#88ddff';
    for (let i=0;i<3;i++) { ctx.beginPath(); ctx.arc(cx+(i-1)*TS*0.1,cy+TS*0.05-i*TS*0.03,TS*0.05-i*0.005,0,Math.PI*2); ctx.fill(); }
    ctx.fillStyle='#aaeeff'; ctx.font=`${Math.max(8,TS*0.4)}px serif`; ctx.textAlign='center';
    ctx.fillText('💧',cx,cy-TS*0.26);
  } else if (type===OUTLET) {
    ctx.fillStyle='#261a08'; ctx.fillRect(s.x,s.y,TS,TS);
    ctx.fillStyle='#8a6020'; ctx.fillRect(cx-TS*0.22,cy-TS*0.18,TS*0.44,TS*0.36);
    ctx.strokeStyle='#553300'; ctx.lineWidth=1; ctx.strokeRect(cx-TS*0.22,cy-TS*0.18,TS*0.44,TS*0.36);
    ctx.fillStyle='#331a00';
    ctx.beginPath(); ctx.arc(cx-TS*0.08,cy,TS*0.045,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+TS*0.08,cy,TS*0.045,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffe000'; ctx.font=`${Math.max(8,TS*0.4)}px serif`; ctx.textAlign='center';
    ctx.fillText('⚡',cx,cy+TS*0.35);
  } else if (type===UPGRADE) {
    ctx.fillStyle='#2a3a2a'; ctx.fillRect(s.x,s.y,TS,TS);
    const pulse=(Math.sin(Date.now()*0.004)+1)/2;
    ctx.strokeStyle=`rgba(255,210,0,${0.5+pulse*0.4})`; ctx.lineWidth=Math.max(2,TS*0.05);
    ctx.beginPath(); ctx.arc(cx,cy,TS*0.4,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,210,0,0.15)';
    ctx.beginPath(); ctx.arc(cx,cy,TS*0.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd200'; ctx.font=`bold ${Math.max(9,TS*0.32)}px monospace`; ctx.textAlign='center';
    ctx.fillText('2×',cx,cy+TS*0.11);
  }
}

// ─── Touch Input ──────────────────────────────────────────────
const joy = {
  L: { active:false, id:-1, bx:0, by:0, tx:0, ty:0 },
  R: { active:false, id:-1, bx:0, by:0, tx:0, ty:0 }
};

function joyDelta(j) {
  if (!j.active) return {dx:0,dy:0,len:0};
  const dx=j.tx-j.bx, dy=j.ty-j.by, len=Math.hypot(dx,dy);
  return {dx,dy,len};
}

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const tx=t.clientX, ty=t.clientY;
    const side = tx < CW/2 ? 'L' : 'R';
    if (!joy[side].active) {
      joy[side].active=true; joy[side].id=t.identifier;
      joy[side].bx=tx; joy[side].by=ty;
      joy[side].tx=tx; joy[side].ty=ty;
    }
  }
},{passive:false});

cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier===joy.L.id) { joy.L.tx=t.clientX; joy.L.ty=t.clientY; }
    if (t.identifier===joy.R.id) { joy.R.tx=t.clientX; joy.R.ty=t.clientY; }
  }
},{passive:false});

cv.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier===joy.L.id) joy.L.active=false;
    if (t.identifier===joy.R.id) joy.R.active=false;
  }
},{passive:false});

// ─── Keyboard ─────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown', e => {
  const k=e.key.toLowerCase(); keys[k]=true;
  if (k==='r') startGame();
  if ((k===' '||k==='enter') && gameState==='playing') { const p=player.shoot(); if(p) projs.push(p); }
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()]=false; });
cv.addEventListener('click', () => { if(gameState==='playing'){const p=player.shoot();if(p)projs.push(p);} });

// ─── HUD (drawn on canvas) ────────────────────────────────────
function miniBar(x, y, w, h, frac, col) {
  ctx.fillStyle='#111'; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=col; ctx.fillRect(x,y,w*Math.max(0,frac),h);
  ctx.strokeStyle='#333'; ctx.lineWidth=0.5; ctx.strokeRect(x,y,w,h);
}

function drawHUD() {
  ctx.fillStyle='rgba(0,0,12,0.84)';
  ctx.fillRect(0,0,CW,HUD_H);
  ctx.strokeStyle='#334'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,HUD_H); ctx.lineTo(CW,HUD_H); ctx.stroke();

  const allEnt=[player,...aiList];
  const bh=Math.max(5, HUD_H*0.1), bw=Math.max(35, CW*0.07);
  const fs=Math.max(9, Math.round(HUD_H*0.2));

  function drawMember(e, x, y, align) {
    const tCol=e.team===0?'#22cc44':'#ff6600';
    const liveT=e.alive&&e.lives>1?1-(e.lives-1)/9:1;
    const liveCol=e.alive?`rgb(${Math.round(220*(1-liveT))},15,${Math.round(220*liveT)})`:'#444';
    ctx.font=`bold ${fs}px monospace`; ctx.textAlign=align;
    ctx.fillStyle=e.alive?tCol:'#444';
    const label=e.alive?`${e.name} ♥${e.lives}`:`${e.name} ☠`;
    ctx.fillText(label, x+(align==='left'?0:0), y);
    if (e.alive) {
      const bx=align==='left'?x:x-bw;
      miniBar(bx,y+2,bw,bh,e.lives/10,liveCol);
      miniBar(bx,y+bh+4,bw,bh,e.water/10,'#0099ff');
      miniBar(bx,y+bh*2+8,bw,bh,e.charge/20,'#ffdd00');
    }
  }

  const col0=allEnt.filter(e=>e.team===0);
  const col1=allEnt.filter(e=>e.team===1);

  // Team Mattis (left side)
  ctx.fillStyle='#22cc44'; ctx.font=`bold ${fs+1}px monospace`; ctx.textAlign='left';
  ctx.fillText('🟢 Team Mattis', 8, HUD_H*0.28);
  col0.forEach((e,i)=>{
    const bx=8+i*(bw+CW*0.035+fs*6.5);
    drawMember(e, bx, HUD_H*0.5, 'left');
  });

  // Team B (right side)
  ctx.fillStyle='#ff6600'; ctx.font=`bold ${fs+1}px monospace`; ctx.textAlign='right';
  ctx.fillText('🟠 Team KI', CW-8, HUD_H*0.28);
  col1.forEach((e,i)=>{
    const bx=CW-8-i*(bw+CW*0.035+fs*6.5);
    drawMember(e, bx, HUD_H*0.5, 'right');
  });

  // Status center
  let stTxt='', stCol='#0f8';
  if (player.state==='charging') { stTxt=`⚡ ${player.chargeTimer.toFixed(1)}s`; stCol='#ff0'; }
  else if (player.charge<=0)    { stTxt='⚡ Steckdose!'; stCol='#f80'; }
  else if (player.water<=0)     { stTxt='💧 Wassersäule!'; stCol='#0af'; }
  else if (player.upgradeTimer>0 && !player.doubleShot) { stTxt=`2× Upgrade ${player.upgradeTimer.toFixed(1)}/2.0s`; stCol='#ffd200'; }
  else if (player.doubleShot)   { stTxt='2× Doppelschuss aktiv'; stCol='#e0e'; }
  else                          { stTxt='Bereit'; stCol='#0f8'; }
  ctx.fillStyle=stCol; ctx.font=`bold ${fs}px monospace`; ctx.textAlign='center';
  ctx.fillText(stTxt, CW/2, HUD_H*0.65);
}

// ─── Joystick Visuals ─────────────────────────────────────────
function drawJoysticks() {
  [['L',JOY_LX,JOY_LY,'↕ Bewegen'],['R',JOY_RX,JOY_RY,'◎ Zielen+Schiessen']].forEach(([side,bx,by,lbl])=>{
    const j=joy[side];
    const cx=j.active?j.bx:bx, cy=j.active?j.by:by;
    // Base ring
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,JOY_R,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.arc(cx,cy,JOY_R,0,Math.PI*2); ctx.fill();
    // Thumb
    let tx=cx,ty=cy;
    if (j.active) {
      const dx=j.tx-cx, dy=j.ty-cy, len=Math.hypot(dx,dy);
      const cl=Math.min(len,JOY_MAX);
      tx=cx+(len>0?dx/len:0)*cl; ty=cy+(len>0?dy/len:0)*cl;
    }
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(tx,ty,JOY_R*0.42,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(tx,ty,JOY_R*0.42,0,Math.PI*2); ctx.stroke();
    // Label
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.font=`${Math.max(9,JOY_R*0.26)}px monospace`; ctx.textAlign='center';
    ctx.fillText(lbl,cx,cy+JOY_R+16);
  });
}

// ─── Game State ───────────────────────────────────────────────
let player, aiList, projs, gameState, lastT;

function startGame() {
  buildMap();
  player  = new Entity(1.5,  1.5,  'DU',   false, 0);
  aiList  = [
    new Entity(13.5, 1.5,  'KI-1', true,  0),
    new Entity(1.5,  13.5, 'KI-2', true,  1),
    new Entity(13.5, 13.5, 'KI-3', true,  1),
  ];
  projs=[]; gameState='playing';
  joy.L.active=false; joy.R.active=false;
}

// ─── Main Loop ────────────────────────────────────────────────
let mouse={x:CW/2,y:CH/2};
cv.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});

function loop(ts) {
  const dt=Math.min((ts-(lastT||ts))/1000,0.05); lastT=ts;

  if (gameState==='playing') {
    // ── Aim ──────────────────────────────────────────────────
    const rd=joyDelta(joy.R);
    if (rd.len > 12) {
      player.angle=Math.atan2(rd.dy, rd.dx);
    } else {
      const wm=fromSc(mouse.x,mouse.y);
      player.angle=Math.atan2(wm.y-player.y, wm.x-player.x);
    }

    // ── Move (joystick) ──────────────────────────────────────
    const ld=joyDelta(joy.L);
    if (ld.len > 12) {
      player.tryMove(ld.dx/ld.len, ld.dy/ld.len, dt);
    }

    // ── Move (keyboard) ──────────────────────────────────────
    let kdx=0, kdy=0;
    if (keys['d']||keys['arrowright']) kdx+=1;
    if (keys['a']||keys['arrowleft'])  kdx-=1;
    if (keys['s']||keys['arrowdown'])  kdy+=1;
    if (keys['w']||keys['arrowup'])    kdy-=1;
    if (kdx||kdy) { const l=Math.hypot(kdx,kdy); player.tryMove(kdx/l,kdy/l,dt); }

    // ── Shoot (right joystick auto) ──────────────────────────
    if (rd.len > JOY_R*0.35) { const p=player.shoot(); if(p) projs.push(p); }

    player.update(dt);

    const all=[player,...aiList];
    for (const ai of aiList) { const p=ai.updateAI(dt,all); if(p) projs.push(p); ai.update(dt); }

    for (const p of projs) {
      p.update(dt); if (!p.alive) continue;
      for (const ent of all) {
        if (ent===p.owner||!ent.alive||ent.team===p.owner.team) continue;
        if (Math.hypot(ent.x-p.x,ent.y-p.y)<0.45) {
          ent.takeDmg(p.dmg);
          if (!ent.alive) p.owner.lives = 10;
          p.alive=false; break;
        }
      }
    }
    projs=projs.filter(p=>p.alive);

    const t0Dead=[player,...aiList].filter(e=>e.team===0).every(e=>!e.alive);
    const t1Dead=[player,...aiList].filter(e=>e.team===1).every(e=>!e.alive);
    if (t1Dead) gameState='won'; else if (t0Dead) gameState='lost';
  }

  // ── Render ───────────────────────────────────────────────────
  ctx.clearRect(0,0,CW,CH);
  const bg=ctx.createLinearGradient(0,0,0,CH);
  bg.addColorStop(0,'#080818'); bg.addColorStop(1,'#101c12');
  ctx.fillStyle=bg; ctx.fillRect(0,0,CW,CH);

  for (let y=0;y<G;y++) for (let x=0;x<G;x++) drawTile(x,y);

  const rq=[];
  for (const e of [player,...aiList]) if(e.alive) rq.push({d:e.y,fn:()=>e.draw()});
  for (const p of projs) rq.push({d:p.y,fn:()=>p.draw()});
  rq.sort((a,b)=>a.d-b.d); rq.forEach(i=>i.fn());

  drawJoysticks();
  drawHUD();

  // Game over
  if (gameState!=='playing') {
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center';
    const won=gameState==='won';
    ctx.fillStyle=won?'#22cc44':'#ff6600';
    const fs2=Math.min(52, CW*0.06);
    ctx.font=`bold ${fs2}px monospace`;
    ctx.fillText(won?'🏆 Team Mattis gewinnt!':'🏆 Team KI gewinnt!',CW/2,CH/2-fs2*0.4);
    ctx.fillStyle='#999'; ctx.font=`${fs2*0.45}px monospace`;
    ctx.fillText('Tippen / R für Neustart',CW/2,CH/2+fs2*0.8);
  }

  requestAnimationFrame(loop);
}

// Tap to restart on game over
cv.addEventListener('touchend', e => {
  if (gameState!=='playing') { startGame(); e.preventDefault(); }
},{passive:false});

startGame();
requestAnimationFrame(loop);
</script>
